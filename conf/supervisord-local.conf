[supervisord]
nodaemon=true
user=root
pidfile=/tmp/supervisord.pid

[program:app]
command=/bin/sh -c "exec env NODE_ENV=production node packages/server/dist/index.js"
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopwaitsecs=30
stopsignal=TERM
killasgroup=true
stopasgroup=true
user=reactapp
